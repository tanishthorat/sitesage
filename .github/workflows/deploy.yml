name: Deploy Backend to EC2

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"               # Only runs if backend changes
      - ".github/workflows/deploy.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # <--- Essential for pushing the image

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          build-args: |
            VERSION=1.0.1
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Login to GHCR inside EC2
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Stop the old docker-compose container to free up port 8000 (Crucial!)
            docker stop sitesage_backend || true
            docker rm sitesage_backend || true
            
            # Stop any previous versions of this CI/CD container
            docker stop api-server || true
            docker rm api-server || true

            # Free disk space before pulling the next image
            docker system prune -af || true

            # Pull new image after cleanup so large layers can be registered successfully
            docker pull ghcr.io/tanishthorat/sitesage-backend:latest
            
            # Run new container (Fixed Network and .env path)
            docker run -d \
              --name api-server \
              --restart always \
              -p 8000:8000 \
              --network sitesage_default \
              --env-file /home/ubuntu/sitesage/backend/.env \
              -v /home/ubuntu/sitesage/backend/serviceAccountKey.json:/app/serviceAccountKey.json:ro \
              ghcr.io/tanishthorat/sitesage-backend:latest

            # Cleanup stale images after the container is running
            docker image prune -af --filter "until=24h" || true
